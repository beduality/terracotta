site_name: Terracotta
site_description: Declarative Minecraft project registry management tool
site_url: https://beduality.github.io/terracotta/
repo_url: https://github.com/beduality/terracotta
repo_name: beduality/terracotta
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  palette:
    - scheme: slate
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

hooks:
  - docs/hooks/copy_kdoc.py
  - docs/hooks/copy_changes.py

plugins:
  - search

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/beduality/terracotta
    - icon: fontawesome/brands/discord
      link: https://discord.gg/D5meCv2Wnd

nav:
  - Quick Start:
    - Introduction: index.md
    - Getting Started: content/gradle-plugin/tutorials/getting-started.md
  - Gradle Plugin:
    - Tutorials:
      - Installation: content/gradle-plugin/tutorials/installation.md
      - Getting Started: content/gradle-plugin/tutorials/getting-started.md
    - How-To Guides:
      - Adding Hangar: content/gradle-plugin/how-to-guides/adding-hangar-provider.md
      - Kotlin DSL Configuration: content/gradle-plugin/how-to-guides/kotlin-dsl-configuration.md
    - Reference:
      - Tasks Reference: content/gradle-plugin/reference/tasks.md
      - Plugin API Docs: apidocs/terracotta-gradle-plugin/index.html
  - Config:
    - Overview: content/config/index.md
    - Schema: content/config/schema.md
  - SDK:
    - Tutorials:
      - Quick Start: content/sdk/tutorials/quick-start.md
    - How-To Guides:
      - Custom Providers: content/sdk/how-to-guides/custom-provider.md
      - Modrinth Provider: content/sdk/how-to-guides/modrinth-provider.md
      - Hangar Provider: content/sdk/how-to-guides/hangar-provider.md
    - Reference:
      - API Reference: content/sdk/reference/api.md
      - Core API Docs: apidocs/terracotta-core/index.html
      - Modrinth Provider API Docs: apidocs/terracotta-provider-modrinth/index.html
      - Hangar Provider API Docs: apidocs/terracotta-provider-hangar/index.html
      - Provider API: content/sdk/reference/provider-api.md
      - Installation: content/sdk/reference/installation.md
    - Explanation:
      - Architecture Overview: content/sdk/explanation/architecture.md
  - Repo:
      - Introduction: content/repo/README.md
      - Tutorials:
        - Quick Start: content/repo/tutorials/quick-start.md
        - Navigating the Codebase: content/repo/tutorials/navigating-the-codebase.md
      - How-To Guides:
        - Contributing: content/repo/how-to-guides/contributing.md
        - Building: content/repo/how-to-guides/building.md
        - Testing: content/repo/how-to-guides/testing.md
        - Documentation: content/repo/how-to-guides/documentation.md
        - Releasing: content/repo/how-to-guides/releasing.md
        - Writing Changelog: content/repo/how-to-guides/writing-changelog.md
      - Reference:
        - Tech Stack: content/repo/reference/tech-stack.md
        - File Structure: content/repo/reference/file-structure.md
        - Configuration: content/repo/reference/configuration.md
        - Architecture Reference: content/repo/reference/architecture-reference.md
        - Code Style: content/repo/reference/code-style.md
      - Explanation:
        - Architecture: content/repo/explanation/architecture.md
        - Project Management: content/repo/explanation/project-management.md
        - Documentation Framework: content/repo/explanation/documentation-framework.md
        - Changelog Guidelines: content/repo/explanation/changelog-guidelines.md
  - Changes: changes.md