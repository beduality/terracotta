name: Deploy docs

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out and deploy docs from'
        type: string
        required: false
        default: ''
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - docs/**
      - modules/**
      - build.gradle.kts
      - gradle/libs.versions.toml
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/configure-pages@v5

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Verify Spotless Check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Generate Dokka Documentation
        run: ./gradlew :dokkaHtmlMultiModule --no-daemon

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --locked

      - name: Deploy documentation with mike
        run: |
          # Check if a version tag points to this commit
          VERSION_TAG=$(git tag --points-at HEAD | grep '^v' | head -n1 || true)
          if [[ -n "$VERSION_TAG" ]]; then
            VERSION=${VERSION_TAG#v}
            uv run mike deploy --push --update-alias "$VERSION" latest
            uv run mike set-default --push latest
          else
            uv run mike deploy --push -t "Unreleased" unreleased
          fi

      - name: Checkout latest gh-pages for upload
        uses: actions/checkout@v5
        with:
          ref: origin/gh-pages
          path: site-deploy

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site-deploy

      - id: deployment
        uses: actions/deploy-pages@v4
