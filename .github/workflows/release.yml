name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - deployments.json
      - mkdocs.yml
      - "**/*.md"
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump strategy for changed modules (auto, patch, minor, major, or a specific version)'
        type: string
        default: 'auto'
      modules:
        description: 'Comma-separated modules to release (optional, e.g. terracotta-core,terracotta-provider-modrinth)'
        type: string
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    if: "github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release changed modules
        run: |
          ARGS="--yes --publish --bump '${{ inputs.bump || 'auto' }}'"
          if [ -n "${{ inputs.modules }}" ]; then
            ARGS="$ARGS --modules '${{ inputs.modules }}'"
          fi
          uv run scripts/release.py release $ARGS
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
